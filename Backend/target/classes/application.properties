# ══════════════════════════════════════════════════════════════════
#  application.properties — VERSIÓN CON JWT
#
#  Cambios respecto al archivo original:
#  1. Se agregan las 3 propiedades "security.jwt.*" al final.
#  2. El resto de la configuración permanece igual.
#     (ajusta usuario/contraseña de BD según tu entorno)
# ══════════════════════════════════════════════════════════════════

spring.application.name=Proyecto_P4_BolsaEmpleo

# ── Base de datos (ajusta según tu entorno) ───────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/bolsa_empleo
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.show-sql=true

# Permite subir CVs grandes (ajusta según necesidad)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── JWT Configuration ─────────────────────────────────────────────
# secret-key: mínimo 32 caracteres para HS256.
# ¡CAMBIA ESTA CLAVE en producción y nunca la subas a Git!
security.jwt.secret-key=BolsaEmpleoSecretKey2025P4ReactProyecto
# expiration-time en milisegundos:
#   3600000  = 1 hora
#   86400000 = 24 horas
security.jwt.expiration-time=3600000
security.jwt.algorithm=HS256
