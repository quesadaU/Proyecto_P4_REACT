<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/fragmentPublic :: head}"></head>
<body>

<section class="Inicio">
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <p>
                <img src="https://cdn-icons-png.flaticon.com/512/86/86155.png"
                     alt="icono"
                     style="width:50px;height:50px;filter: brightness(0) invert(1);">
                <strong> Bolsa de Empleo</strong>
            </p>
            <div class="navbar-nav ms-auto align-items-center">
                <a class="nav-link" th:href="@{/}">Inicio</a>
                <a class="nav-link" th:href="@{/login}">Login</a>
            </div>
        </div>
    </nav>
</section>

<div class="contenedor-filtros">
    <h4>Buscar puestos por características</h4>

    <form th:action="@{/buscaPuesto}" method="get">
        <div class="seccion-scroll">

            <div class="grupo-categoria"
                 th:each="padre : ${padres}">

                <!-- Nivel 1: padre (raíz) -->
                <div class="categoria-padre">
                    <input type="checkbox"
                           th:id="'car-' + ${padre.id}"
                           name="ids"
                           th:value="${padre.id}">
                    <label th:for="'car-' + ${padre.id}"
                           th:text="${padre.nombre}">
                    </label>
                </div>

                <!-- Nivel 2: hijos del padre -->
                <div class="sub-opciones"
                     th:if="${hijos[padre.id] != null and not #lists.isEmpty(hijos[padre.id])}">
                    <div th:each="hijo : ${hijos[padre.id]}">
                        <div class="item">
                            <input type="checkbox"
                                   th:id="'car-' + ${hijo.id}"
                                   name="ids"
                                   th:value="${hijo.id}">
                            <label th:for="'car-' + ${hijo.id}"
                                   th:text="${hijo.nombre}">
                            </label>
                        </div>
                        <!-- Nivel 3: nietos (hijos del hijo) -->
                        <div class="sub-opciones ms-3"
                             th:if="${hijos[hijo.id] != null and not #lists.isEmpty(hijos[hijo.id])}">
                            <div class="item"
                                 th:each="nieto : ${hijos[hijo.id]}">
                                <input type="checkbox"
                                       th:id="'car-' + ${nieto.id}"
                                       name="ids"
                                       th:value="${nieto.id}">
                                <label th:for="'car-' + ${nieto.id}"
                                       th:text="${nieto.nombre}">
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

            </div><!-- /grupo-categoria -->

            <p th:if="${padres == null or #lists.isEmpty(padres)}"
               class="text-muted small">
                No hay características registradas aún.
            </p>

        </div><!-- /seccion-scroll -->

        <div class="seccion-botones">
            <button type="submit" class="btn-azul">Buscar</button>
            <button type="reset"  class="btn-blanco">Limpiar</button>
        </div>
    </form>
</div>

<div class="MostrarPuestos">

    <p th:if="${puestos == null}"
       style="text-align:center; padding: 2rem; color: #666;">
        Seleccioná una o más características y presioná <strong>Buscar</strong>.
    </p>

    <p th:if="${puestos != null and #lists.isEmpty(puestos)}"
       style="text-align:center; padding: 2rem; color: #666;">
        No se encontraron puestos con las características seleccionadas.
    </p>

    <div class="grid-puestos"
         th:if="${puestos != null and not #lists.isEmpty(puestos)}">
        <div class="card-puesto" th:each="p : ${puestos}">
            <h3 style="font-weight:bold;"
                th:text="${p.empresa != null ? p.empresa.nombre : 'Empresa'}">
            </h3>
            <p class="titulo" th:text="${p.descripcion}"></p>
            <p class="salario" th:text="'₡ ' + ${p.salario}"></p>
            <div class="detalle">
                <p><strong>Tipo:</strong> <span th:text="${p.tipo}"></span></p>
                <p><strong>Estado:</strong> <span th:text="${p.estado}"></span></p>
                <p><strong>Fecha:</strong> <span th:text="${p.fecha}"></span></p>
            </div>
        </div>
    </div>

</div>

<footer th:replace="~{presentation/fragmentPublic :: footer}"></footer>
</body>
</html>
