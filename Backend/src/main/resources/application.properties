spring.application.name=Backend
server.port=8080

# ?? Base de datos ?????????????????????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/Proyecto_P4_BolsaEmpleo?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? Hibernate ?????????????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ?? Inicialización SQL ????????????????????????????????????????????????????????
# IMPORTANTE: Spring Boot busca data.sql en la raíz de resources/ por defecto.
# Como el archivo está en resources/db/, hay que indicar la ruta explícitamente.
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:db/data.sql

# Hace que data.sql corra DESPUÉS de que Hibernate crea las tablas
spring.jpa.defer-datasource-initialization=true