<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/fragmentPublic :: head}"></head>
<body>

<section class="Inicio">
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <p class="mb-0 d-flex align-items-center">
                <img src="https://cdn-icons-png.flaticon.com/512/86/86155.png" alt="icono"
                     style="width:50px;height:50px;filter: brightness(0) invert(1);">
                <strong class="ms-2 text-white"> Bolsa de Empleo</strong>
            </p>
            <div class="navbar-nav ms-auto align-items-center">
                <a class="nav-link"        th:href="@{/DashboardEmpresa}">Dashboard</a>
                <a class="nav-link"        th:href="@{/empresa/puestos}">Mis puestos</a>
                <a class="nav-link active" th:href="@{/empresa/puestos/nuevo}">Publicar puesto</a>
                <a class="nav-link"        th:href="@{/empresa/editar}">Mi perfil</a>
                <a class="nav-link"        th:href="@{/logout}">Salir</a>
            </div>
        </div>
    </nav>
</section>

<div class="container mt-5">
    <h2 class="fw-bold">Publicar nuevo puesto</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card p-4" style="max-width: 600px;">
        <form method="POST" th:action="@{/empresa/puestos/nuevo}">

            <div class="mb-3">
                <label class="form-label fw-bold">Descripción del puesto <span class="text-danger">*</span></label>
                <textarea name="descripcion" class="form-control" rows="3"
                          placeholder="ej: Desarrollador Java Backend..." required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Salario (₡) <span class="text-danger">*</span></label>
                <input type="number" name="salario" class="form-control"
                       placeholder="ej: 1500000" min="0" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Tipo de publicación <span class="text-danger">*</span></label>
                <select name="tipo" class="form-select" required>
                    <option value="PUBLICO">Público — visible para todos</option>
                    <option value="PRIVADO">Privado — solo oferentes registrados</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">Crear puesto</button>
        </form>

        <hr class="mt-4">
        <p class="text-muted small">
            Después de crear el puesto podrás agregarle las características requeridas
            desde la vista <strong>Habilidades</strong> en "Mis puestos".
        </p>
    </div>
</div>

<footer th:replace="~{presentation/fragmentPublic :: footer}"></footer>
</body>
</html>
