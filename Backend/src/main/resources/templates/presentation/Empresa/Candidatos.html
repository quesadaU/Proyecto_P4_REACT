<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/fragmentPublic :: head}"></head>
<body>

<section class="Inicio">
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <p class="mb-0 d-flex align-items-center">
                <img src="https://cdn-icons-png.flaticon.com/512/86/86155.png" alt="icono"
                     style="width:50px;height:50px;filter: brightness(0) invert(1);">
                <strong class="ms-2 text-white"> Bolsa de Empleo</strong>
            </p>
            <div class="navbar-nav ms-auto align-items-center">
                <a class="nav-link" th:href="@{/DashboardEmpresa}">Dashboard</a>
                <a class="nav-link active" th:href="@{/empresa/puestos}">Mis puestos</a>
                <a class="nav-link" th:href="@{/empresa/puestos/nuevo}">Publicar puesto</a>
                <a class="nav-link" th:href="@{/logout}">Salir</a>
            </div>
        </div>
    </nav>
</section>

<div class="container mt-5">
    <h2 class="fw-bold">Candidatos para el puesto</h2>
    <p class="text-muted">
        <strong>Puesto:</strong> <span th:text="${puesto.descripcion}"></span>
    </p>

    <!-- Sin candidatos -->
    <p th:if="${candidatos == null or #lists.isEmpty(candidatos)}" class="text-muted">
        No hay oferentes aprobados en el sistema aún.
    </p>

    <!-- Tabla de candidatos ordenada por % de coincidencia -->
    <table class="table table-bordered"
           th:if="${candidatos != null and not #lists.isEmpty(candidatos)}">
        <thead class="table-dark">
            <tr>
                <th>Oferente</th>
                <th>Requisitos cumplidos</th>
                <th>% Coincidencia</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="r : ${candidatos}">
                <td th:text="${r.oferente.nombre + ' ' + r.oferente.apellido}"></td>
                <td th:text="${r.requisitosCumplidos + ' / ' + r.requisitosTotal}"></td>
                <td>
                    <!-- Barra de progreso visual -->
                    <div class="progress" style="height: 20px;">
                        <div class="progress-bar"
                             th:classappend="${r.porcentaje >= 75} ? 'bg-success' : (${r.porcentaje >= 40} ? 'bg-warning' : 'bg-danger')"
                             role="progressbar"
                             th:style="'width: ' + ${r.porcentaje} + '%'"
                             th:text="${#numbers.formatDecimal(r.porcentaje, 1, 2) + '%'}">
                        </div>
                    </div>
                </td>
                <td>
                    <a th:href="@{/empresa/candidatos/detalle(oferenteId=${r.oferente.id})}"
                       class="btn btn-sm btn-primary">Ver detalle</a>
                </td>
            </tr>
        </tbody>
    </table>

    <a th:href="@{/empresa/puestos}" class="btn btn-secondary mt-3">Volver</a>
</div>

<footer th:replace="~{presentation/fragmentPublic :: footer}"></footer>
</body>
</html>
