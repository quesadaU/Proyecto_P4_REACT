<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{presentation/fragmentPublic :: head}"></head>
<body>

<section class="Inicio">
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <p class="mb-0 d-flex align-items-center">
                <img src="https://cdn-icons-png.flaticon.com/512/86/86155.png" alt="icono"
                     style="width:50px;height:50px;filter: brightness(0) invert(1);">
                <strong class="ms-2 text-white"> Bolsa de Empleo</strong>
            </p>
            <div class="navbar-nav ms-auto align-items-center">
                <a class="nav-link"        th:href="@{/DashboardEmpresa}">Dashboard</a>
                <a class="nav-link"        th:href="@{/empresa/puestos}">Mis puestos</a>
                <a class="nav-link active" th:href="@{/empresa/editar}">Mi perfil</a>
                <a class="nav-link"        th:href="@{/logout}">Salir</a>
            </div>
        </div>
    </nav>
</section>

<div class="container mt-5">
    <h2 class="fw-bold">Editar datos de la empresa</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card p-4" style="max-width: 600px;">
        <form method="POST" th:action="@{/empresa/editar}">

            <div class="mb-3">
                <label class="form-label fw-bold">Nombre <span class="text-danger">*</span></label>
                <input type="text" name="nombre" class="form-control"
                       th:value="${empresa.nombre}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Localización</label>
                <input type="text" name="localizacion" class="form-control"
                       th:value="${empresa.localizacion}">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Correo electrónico</label>
                <input type="email" name="correo" class="form-control"
                       th:value="${empresa.correo}">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Teléfono</label>
                <input type="text" name="telefono" class="form-control"
                       th:value="${empresa.telefono}">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="3"
                          th:text="${empresa.descripcion}"></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100">Guardar cambios</button>
        </form>
    </div>
</div>

<footer th:replace="~{presentation/fragmentPublic :: footer}"></footer>
</body>
</html>
